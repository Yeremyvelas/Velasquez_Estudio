<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Hombre | Street-Cred</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f8f8f8;
    }

    header {
      padding: 20px 40px;
      background: white;
      border-bottom: 1px solid #eee;
      font-weight: bold;
    }

    .categorias {
      display: flex;
      gap: 20px;
      padding: 20px 40px;
      background: white;
      border-bottom: 1px solid #eee;
    }

    .categorias div {
      cursor: pointer;
      font-weight: 500;
    }

    .productos {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 25px;
      padding: 30px;
    }

    .producto {
      background: white;
      padding: 10px;
      border-radius: 10px;
      text-align: center;
      transition: 0.3s;
    }

    .producto:hover {
      transform: translateY(-5px);
    }

    img {
      width: 100%;
      border-radius: 10px;
    }

    .precio {
      font-weight: bold;
    }
  </style>
</head>

<body>

<header>
  Street-Cred / Hombre
</header>

<div class="categorias">
  <div>Polos</div>
  <div>Hoodies</div>
  <div>Shorts</div>
  <div>Joggers</div>
</div>

<section class="productos">

  <div class="producto">
    <a href="producto.html">
      <img src="https://via.placeholder.com/300">
      <p>Polo urbano</p>
    </a>
    <p class="precio">S/ 80</p>
  </div>

  <div class="producto">
    <img src="https://via.placeholder.com/300">
    <p>Hoodie street</p>
    <p class="precio">S/ 150</p>
  </div>

  <div class="producto">
    <img src="https://via.placeholder.com/300">
    <p>Shorts básicos</p>
    <p class="precio">S/ 120</p>
  </div>

  <div class="producto">
    <img src="https://via.placeholder.com/300">
    <p>Jogger premium</p>
    <p class="precio">S/ 140</p>
  </div>

</section>

</body>
</html>
