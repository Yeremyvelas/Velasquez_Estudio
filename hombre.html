<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Hombre</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f8f8f8;
    }

    header {
      padding: 20px;
      background: white;
      border-bottom: 1px solid #eee;
    }

    .productos {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 30px;
      padding: 40px;
    }

    .producto {
      background: white;
      padding: 15px;
      text-align: center;
      border-radius: 10px;
    }

    img {
      width: 100%;
    }
  </style>
</head>

<body>

<header>
  <h2>Ropa para Hombre</h2>
</header>

<section class="productos">

  <div class="producto">
    <img src="https://via.placeholder.com/300">
    <p>Polo Urbano</p>
    <p>S/ 80</p>
  </div>

  <a href="producto.html">
  <img src="https://via.placeholder.com/300">
  <p>Hoodie Street</p>
</a>

</section>

</body>
</html>
